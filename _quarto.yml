project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - Sessions/W1_Intro_and_data/README.qmd
    - Labs/W1_Intro_and_data/README.qmd

website:
  title: "Quantitative Methods"
  sidebar:
    style: "docked"
    search: true
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Sessions"
        contents:
          - text: "Week 1: Introduction and Data"
            file: Sessions/W1_Intro_and_data/README.qmd
      - section: "Labs"
        contents:
          - text: "Week 1: Data Lab"
            file: Labs/W1_Intro_and_data/README.qmd

format:
  html:
    theme: cosmo
    toc: true
    embed-resources: false
    highlight-style: a11y-dark
    code-copy: hover
    code-line-numbers: true
    filters:
      - callouts.lua
